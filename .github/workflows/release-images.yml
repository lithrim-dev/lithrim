# Publishes the BFF + UI images to GHCR on a version tag (v*), or manually via
# workflow_dispatch. Multi-arch (linux/amd64 + linux/arm64) via buildx/QEMU.
#
# Fork-safe by construction: forks BUILD both images (a real CI signal) but the
# push flag is conditioned on the canonical repository, so only lithrim-dev/lithrim
# ever publishes. Auth is the workflow's own GITHUB_TOKEN; no other secrets.
name: Release images

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/lithrim-dev/lithrim-bff
            dockerfile: Dockerfile.bff
          - image: ghcr.io/lithrim-dev/lithrim-ui
            dockerfile: Dockerfile.ui
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR (canonical repo only)
        if: github.repository == 'lithrim-dev/lithrim'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # `github.ref_name` is the tag on a v* push (the intended release path); on a
      # workflow_dispatch it is the branch name, giving a branch-named preview tag.
      - name: Build (push only from the canonical repo)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.repository == 'lithrim-dev/lithrim' }}
          tags: |
            ${{ matrix.image }}:${{ github.ref_name }}
            ${{ matrix.image }}:latest
